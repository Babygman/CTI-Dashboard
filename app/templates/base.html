<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>CTI Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/">

            <i class="bi bi-shield-lock-fill"></i>

            CTI Dashboard

        </a>

        <div class="ms-auto text-white">

            Version 0.5.0-alpha

        </div>

    </div>

</nav>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2 bg-dark text-white vh-100 pt-4">

            <h5 class="mb-4">MENU</h5>

            <div class="list-group">

                <a href="/" class="list-group-item list-group-item-action">

                    <i class="bi bi-speedometer2 me-2"></i>Dashboard

                </a>

                <a href="{{ url_for('threats.threat_list') }}" class="list-group-item list-group-item-action">

                    <i class="bi bi-shield-exclamation me-2"></i>Threat Feed

                </a>

                <a href="{{ url_for('vendors.vendor_list') }}" class="list-group-item list-group-item-action">

                    <i class="bi bi-building me-2"></i>Vendors

                </a>

                <a href="#" class="list-group-item list-group-item-action">

                    <i class="bi bi-gear-fill me-2"></i>Settings

                </a>

            </div>

        </div>

        <div class="col-md-10 p-4">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            {% block content %}

            {% endblock %}

        </div>

    </div>

</div>

</body>

</html>
