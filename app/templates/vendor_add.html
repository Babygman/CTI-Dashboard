{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Add Vendor</h2>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label for="vendor_name" class="form-label">Vendor Name</label>
                <input type="text" class="form-control{% if errors.get('vendor_name') %} is-invalid{% endif %}"
                       id="vendor_name" name="vendor_name" maxlength="100"
                       value="{{ form_data.vendor_name }}" required>
                {% if errors.get('vendor_name') %}
                <div class="invalid-feedback">{{ errors.vendor_name }}</div>
                {% endif %}
            </div>

            <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <input type="text" class="form-control{% if errors.get('category') %} is-invalid{% endif %}"
                       id="category" name="category" maxlength="100"
                       value="{{ form_data.category }}">
                {% if errors.get('category') %}
                <div class="invalid-feedback">{{ errors.category }}</div>
                {% endif %}
            </div>

            <div class="mb-3">
                <label for="website" class="form-label">Website</label>
                <input type="text" class="form-control{% if errors.get('website') %} is-invalid{% endif %}"
                       id="website" name="website" maxlength="255"
                       value="{{ form_data.website }}">
                {% if errors.get('website') %}
                <div class="invalid-feedback">{{ errors.website }}</div>
                {% endif %}
            </div>

            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="enabled" name="enabled"
                       {% if form_data.enabled %}checked{% endif %}>
                <label for="enabled" class="form-check-label">Enabled</label>
            </div>

            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('vendors.vendor_list') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
