{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Vendors</h2>

<div class="card shadow-sm">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped align-middle mb-0">
                <thead>
                    <tr>
                        <th>Vendor Name</th>
                        <th>Category</th>
                        <th>Website</th>
                        <th>Enabled</th>
                    </tr>
                </thead>
                <tbody>
                    {% for vendor in vendors %}
                    <tr>
                        <td>{{ vendor.VendorName }}</td>
                        <td>{{ vendor.Category or '' }}</td>
                        <td>{{ vendor.Website or '' }}</td>
                        <td>{{ 'Yes' if vendor.Enabled else 'No' }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center text-muted">No vendors found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
